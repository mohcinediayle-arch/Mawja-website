<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAWJA — مراجعة الطلب</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&family=Amiri:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C; --gold-l:#E8C97A;
  --dark:#0A0A0F; --dark2:#111118;
  --white:#FAFAF5; --gray:#777788;
  --neon:#00BFFF; --neon-g:#00FF9D;
  --wa:#25D366;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;padding:24px 16px 60px;}
.wrap{max-width:780px;margin:0 auto;}
.top{text-align:center;margin-bottom:28px;}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,#fff,var(--gold-l),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(0,191,255,0.5);text-transform:uppercase;margin-top:8px;}

.info-card{background:var(--dark2);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:20px;margin-bottom:20px;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{color:var(--gray);}
.info-val{font-weight:600;}

.section-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin:24px 0 10px;}

.preview-frame-wrap{border:1px solid rgba(201,168,76,0.2);border-radius:14px;overflow:hidden;height:60vh;background:#fff;}
#preview-frame{width:100%;height:100%;border:none;}

.content-card{background:var(--dark2);border:1px solid rgba(0,191,255,0.15);border-radius:14px;padding:18px;margin-bottom:14px;}
.content-text{font-family:'Amiri',serif;font-size:15px;line-height:1.8;white-space:pre-wrap;}
.hashtag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.hashtag{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold-l);background:rgba(201,168,76,0.08);padding:4px 10px;border-radius:6px;}

.action-bar{display:flex;gap:12px;margin-top:24px;}
.act-btn{flex:1;padding:16px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:10px;cursor:pointer;border:none;}
.act-approve{background:linear-gradient(135deg,#1a472a,#145a32);border:1px solid rgba(37,211,102,0.3);color:var(--wa);}
.act-copy{background:rgba(0,191,255,0.08);border:1px solid rgba(0,191,255,0.25);color:var(--neon);}

.status-loading,.status-error{text-align:center;padding:80px 20px;font-family:'Amiri',serif;color:var(--gray);}
.hidden{display:none;}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <div class="logo">MAWJA</div>
    <div class="tag">✦ صفحة المراجعة الداخلية ✦</div>
  </div>

  <div id="loading-state" class="status-loading">جاري تحميل الطلب...</div>
  <div id="error-state" class="status-error hidden">تعذر إيجاد هاد الطلب. تأكد من الرابط.</div>

  <div id="content-state" class="hidden">
    <div class="info-card">
      <div class="info-row"><span class="info-lbl">البزنس</span><span class="info-val" id="info-business"></span></div>
      <div class="info-row"><span class="info-lbl">رقم الزبون</span><span class="info-val" id="info-phone"></span></div>
      <div class="info-row"><span class="info-lbl">القطاع</span><span class="info-val" id="info-sector"></span></div>
      <div class="info-row"><span class="info-lbl">المدينة</span><span class="info-val" id="info-city"></span></div>
      <div class="info-row"><span class="info-lbl">النوع</span><span class="info-val" id="info-type"></span></div>
    </div>

    <div id="website-block" class="hidden">
      <div class="section-lbl">✦ معاينة الموقع</div>
      <div class="preview-frame-wrap"><iframe id="preview-frame"></iframe></div>
    </div>

    <div id="social-block" class="hidden">
      <div class="section-lbl">✦ النص الجاهز للنشر</div>
      <div class="content-card">
        <div class="content-text" id="social-caption"></div>
        <div class="hashtag-row" id="social-hashtags"></div>
      </div>
      <div class="section-lbl">✦ اقتراح الصورة / اللقطة</div>
      <div class="content-card">
        <div class="content-text" id="social-image-idea"></div>
      </div>
    </div>

    <div class="action-bar">
      <button class="act-btn act-copy" id="copy-link-btn">📋 نسخ الرابط للزبون</button>
      <button class="act-btn act-approve" id="approve-btn">✓ موافق — إرسال للزبون</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

var params = new URLSearchParams(window.location.search);
var requestId = params.get('id');

function show(id){
  ['loading-state','error-state','content-state'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

if(!requestId){
  show('error-state');
  return;
}

fetch('/api/get-request?id='+encodeURIComponent(requestId))
  .then(function(r){ if(!r.ok) throw new Error('not found'); return r.json(); })
  .then(function(data){
    var req = data.request;
    document.getElementById('info-business').textContent = req.businessName || '-';
    document.getElementById('info-phone').textContent = req.contactPhone || '-';
    document.getElementById('info-sector').textContent = req.sector || '-';
    document.getElementById('info-city').textContent = req.city || '-';
    document.getElementById('info-type').textContent = req.type==='website' ? 'موقع' : 'محتوى سوشيال ميديا';

    if(req.type === 'website'){
      document.getElementById('website-block').classList.remove('hidden');
      document.getElementById('preview-frame').srcdoc = req.payload.html || '';
    } else if(req.type === 'social'){
      document.getElementById('social-block').classList.remove('hidden');
      document.getElementById('social-caption').textContent = req.payload.caption || '';
      document.getElementById('social-image-idea').textContent = req.payload.imageIdea || '';
      var hashEl = document.getElementById('social-hashtags');
      (req.payload.hashtags||[]).forEach(function(h){
        var span = document.createElement('span');
        span.className = 'hashtag';
        span.textContent = h;
        hashEl.appendChild(span);
      });
    }

    document.getElementById('approve-btn').onclick = function(){
      var phone = (req.contactPhone||'').replace(/[^0-9]/g,'');
      var msg = encodeURIComponent('سلام، المنتوج ديالك جاهز ✓\n\nالبزنس: '+req.businessName+'\n\nتفضل، تواصل معنا لأي تعديل إضافي 🌊');
      window.open('https://wa.me/'+phone+'?text='+msg, '_blank');
    };

    document.getElementById('copy-link-btn').onclick = function(){
      navigator.clipboard.writeText(window.location.href).then(function(){
        var btn = document.getElementById('copy-link-btn');
        var orig = btn.textContent;
        btn.textContent = '✓ تم النسخ';
        setTimeout(function(){ btn.textContent = orig; }, 1500);
      });
    };

    show('content-state');
  })
  .catch(function(){
    show('error-state');
  });

})();
</script>
</body>
</html>
