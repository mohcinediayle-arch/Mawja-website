<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#C9A84C" />
  <meta name="description" content="MAWJA Digital Agency — وكالة رقمية احترافية من المغرب" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MAWJA" />

  <!-- Open Graph -->
  <meta property="og:title" content="MAWJA Digital Agency" />
  <meta property="og:description" content="نحن نصنع الموجة من المغرب للعالم" />
  <meta property="og:image" content="/icon-512.png" />
  <meta property="og:type" content="website" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

  <!-- Splash screens for iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <title>MAWJA — Digital Agency</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; height: 100%;
      background: #05040A;
      overflow: hidden;
    }
    /* PWA Install Banner */
    #pwa-install-banner {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #0A0912, #0E0D18);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px; padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      max-width: 340px; width: calc(100% - 40px);
      font-family: 'Tajawal', sans-serif; direction: rtl;
      animation: slide-up 0.4s ease;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #pwa-install-banner.hidden { display: none; }
    .pwa-icon { width: 48px; height: 48px; border-radius: 12px; }
    .pwa-text { flex: 1; }
    .pwa-title { font-size: 14px; font-weight: 700; color: #F0EAD6; margin-bottom: 2px; }
    .pwa-sub   { font-size: 11px; color: rgba(201,168,76,0.6); }
    .pwa-btn {
      background: linear-gradient(135deg, #E8C264, #C9A84C);
      color: #080600; font-weight: 800; font-size: 12px;
      padding: 9px 16px; border-radius: 8px; border: none;
      cursor: pointer; white-space: nowrap; letter-spacing: 0.5px;
    }
    .pwa-close {
      background: none; border: none; color: rgba(107,101,96,0.5);
      font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
    }
    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: #05040A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 8888;
    }
    #loading.done { display: none; }
    .loading-ring {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.1);
      border-top-color: #C9A84C;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px; letter-spacing: 8px;
      background: linear-gradient(135deg, #F0D882, #C9A84C);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-ring"></div>
    <div class="loading-name">MAWJA</div>
  </div>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" class="hidden">
    <img src="/icon-192.png" class="pwa-icon" alt="MAWJA" />
    <div class="pwa-text">
      <div class="pwa-title">حمّل تطبيق MAWJA</div>
      <div class="pwa-sub">مجاناً — بدون متجر تطبيقات</div>
    </div>
    <button class="pwa-btn" id="pwa-install-btn">تنزيل</button>
    <button class="pwa-close" id="pwa-close-btn">✕</button>
  </div>

  <div id="root"></div>

  <script>
    // ── PWA Install Prompt ──
    let deferredPrompt = null;
    const banner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const closeBtn = document.getElementById('pwa-close-btn');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      // Show banner after 3 seconds
      setTimeout(() => { banner.classList.remove('hidden'); }, 3000);
    });

    installBtn?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.add('hidden');
    });

    closeBtn?.addEventListener('click', () => {
      banner.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      banner.classList.add('hidden');
      console.log('MAWJA PWA installed!');
    });

    // ── Service Worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }

    // ── Hide loading after React mounts ──
    setTimeout(() => {
      document.getElementById('loading')?.classList.add('done');
    }, 1200);
  </script>

  <!-- React App will be injected here by build tool -->
  <!-- For GitHub Pages: use Vite or CRA build output -->
</body>
</html>
